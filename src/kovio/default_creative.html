<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Robotads — default creative</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 30% 30%, #534AB7 0%, #1A2A6C 60%, #0A0E2E 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    .card { text-align: center; padding: 24px; }
    .pulse {
      width: 14px; height: 14px; border-radius: 50%;
      background: #4ADE80; display: inline-block; margin-right: 8px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(1.4); }
    }
    .small { font-size: 14px; opacity: .7; letter-spacing: .08em;
             text-transform: uppercase; }
    h1 { font-size: 56px; margin: 6px 0 12px; letter-spacing: -0.02em; }
    p  { font-size: 20px; opacity: .85; margin: 0 0 28px; }
    .qr {
      width: 160px; height: 160px; background: white;
      margin: 0 auto; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #222; font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="small"><span class="pulse"></span>Robotads · default creative</div>
    <h1>Your ad here.</h1>
    <p>Pass <code>creative_url=</code> to KovioAgent to replace this.</p>
    <div class="qr">QR placeholder</div>
  </div>
</body>
</html>
