<!doctype html>
<html><head><meta charset="utf-8"><title>Brand</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;
    font-family:-apple-system,system-ui,sans-serif}
  body{display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 30% 30%,#534AB7 0%,#1A2A6C 60%,#0A0E2E 100%);color:#fff}
  .card{text-align:center;padding:24px}
  .pulse{width:14px;height:14px;border-radius:50%;background:#4ADE80;
    display:inline-block;margin-right:8px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
  .tag{font-size:13px;letter-spacing:.15em;text-transform:uppercase;opacity:.8;margin-bottom:10px}
  h1{font-size:64px;letter-spacing:-0.02em;margin:0 0 14px}
  p{font-size:20px;opacity:.85;margin:0 0 28px}
  .qr{width:140px;height:140px;background:#fff;color:#222;
    border-radius:14px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:12px}
</style></head><body>
<div class="card">
  <div class="tag"><span class="pulse"></span>Kovio · live</div>
  <h1>The future,<br>rolling.</h1>
  <p>This robot is part of the Kovio network.</p>
  <div class="qr">QR → kovio.dev</div>
</div>
</body></html>
