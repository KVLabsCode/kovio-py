<!doctype html>
<html><head><meta charset="utf-8"><title>Morning coffee</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;
    font-family:-apple-system,system-ui,sans-serif}
  body{display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#6F4E37 0%,#3C2415 100%);color:#FFF8EE}
  .card{text-align:center;padding:24px}
  .tag{font-size:13px;letter-spacing:.15em;text-transform:uppercase;opacity:.7;margin-bottom:10px}
  h1{font-size:64px;letter-spacing:-0.02em;margin:0 0 14px}
  p{font-size:20px;opacity:.85;margin:0 0 28px}
  .qr{width:140px;height:140px;background:#FFF8EE;color:#3C2415;
    border-radius:14px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:12px}
</style></head><body>
<div class="card">
  <div class="tag">Cafe Astra · Morning</div>
  <h1>Free pastry<br>with any coffee.</h1>
  <p>Today only · 7–11am · 2 blocks from here</p>
  <div class="qr">QR → cafe.example</div>
</div>
</body></html>
